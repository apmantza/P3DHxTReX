# =============================================================================
# BBIRR — Plan Defaults
# =============================================================================
# Baseline assumptions applied to every new business plan.
# Override per-plan via plan.portfolio_allocations / plan.rate_environment
# stored in the database (those values are merged on top of these defaults).
#
# All rates are annualised decimals (e.g. 0.035 = 3.5%).
# All EUR amounts are in EUR millions.
# All quarterly growth rates are decimals (e.g. 0.010 = 1.0% per quarter).
# =============================================================================


# -----------------------------------------------------------------------------
# Rate environment
# Resolved each projection run; overridden by scenario macro_assumptions.
# -----------------------------------------------------------------------------
rate_environment:
  policy_rate:  0.035    # ECB deposit facility rate (DFR)
  euribor_3m:   0.030
  euribor_6m:   0.032
  swap_2y:      0.028
  swap_5y:      0.025
  swap_10y:     0.027
  rate_path:    []       # 20-element list to override per quarter; empty = flat


# -----------------------------------------------------------------------------
# Balance sheet growth
# -----------------------------------------------------------------------------
portfolio:
  loan_growth_q:          0.010   # gross loan book growth per quarter (~4% annual)
  fvoci_growth_q:         0.005   # FVOCI securities (~2% annual)


# -----------------------------------------------------------------------------
# Asset yields
# -----------------------------------------------------------------------------
yields:
  loan_yield:             0.055   # annualised blended yield on net loan book
  bond_yield:             0.040   # annualised yield on FVOCI portfolio
  cash_yield_spread:      0.002   # spread over DFR earned on cash & central bank reserves


# -----------------------------------------------------------------------------
# Fee income  (volume-driven per segment)
# When a plan has prior fee_detail set the per-segment drivers below apply.
# The flat fee_growth_q is only used as a fallback on first quarter.
# -----------------------------------------------------------------------------
fees:
  # Per-segment growth rates
  retail_fee_growth_q:        0.008   # transaction / card / account fees (~3.2% annual)
  corporate_fee_growth_q:     0.008   # corporate banking fees

  # Asset management: AUM-driven when aum_opening > 0; otherwise growth proxy
  aum_opening:                0.0     # opening AUM; set to actual figure if available
  aum_growth_q:               0.010   # AUM growth per quarter (~4% annual)
  mgmt_fee_rate:              0.005   # annual management fee rate on AUM (50 bps)

  # Treasury / markets fees: applied as yield on total assets
  treasury_fee_yield:         0.0008  # annual yield (8 bps on total assets)

  # Legacy flat model — segment weights used when no prior fee_detail is available
  fee_growth_q:               0.010
  fee_weights:
    retail:                   0.50
    corporate:                0.30
    asset_mgmt:               0.10
    treasury:                 0.10


# -----------------------------------------------------------------------------
# Operating expenses  (per-line growth model)
# When prior opex_detail is available the per-line drivers below apply.
# The flat opex_growth_q / split percentages are a fallback only.
# -----------------------------------------------------------------------------
opex:
  # Per-line growth rates
  personnel_growth_q:     0.005   # salary + headcount growth (~2% annual)
  ga_growth_q:            0.003   # general & administrative (~1.2% annual)

  # Capital expenditure → incremental D&A
  capex_q:                0.0     # quarterly capex; set to actual investment plan
  da_life_years:          5.0     # average asset life (years) for incremental D&A

  # Legacy flat model — used when no prior opex_detail is available
  opex_growth_q:          0.005
  personnel_pct:          0.60    # fraction of total opex
  ga_pct:                 0.25
  depn_pct:               0.15


# -----------------------------------------------------------------------------
# Other P&L lines
# -----------------------------------------------------------------------------
other_income:
  trading_income_annual:  0.0     # net trading income (EUR mn, annual); /4 applied internally
  other_income_annual:    0.0     # other operating income (EUR mn, annual)


# -----------------------------------------------------------------------------
# Tax
# -----------------------------------------------------------------------------
tax:
  tax_rate:               0.22    # effective / statutory corporate tax rate
  current_tax_rate:       0.20    # portion settled in cash this period
  deferred_tax_rate:      0.02    # deferred tax movement


# -----------------------------------------------------------------------------
# Credit quality and ECL
# -----------------------------------------------------------------------------
credit:
  default_rate_q:             0.004   # quarterly new NPL formation rate on loans
  cure_rate_q:                0.050   # quarterly NPL cure rate
  write_off_rate_q:           0.030   # quarterly write-off rate on NPL stock
  npe_disposal_rate_q:        0.0     # NPE sales/securitisation (quarterly % of NPL stock)
  stage2_proportion:          0.08    # stage-2 proportion of performing book

  obs_commitments_pct:        0.15    # off-balance-sheet commitments as % of loans
  obs_ccf:                    0.75    # credit conversion factor for OBS commitments
  loan_repayment_rate_annual: 0.15    # annual loan repayment / amortisation rate


# -----------------------------------------------------------------------------
# Deposit repricing and funding volumes
# -----------------------------------------------------------------------------
deposit:
  deposit_beta:                   0.30   # retail deposit pass-through of rate changes
  retail_deposit_growth_q:        0.005  # retail deposit volume growth per quarter
  corporate_deposit_growth_q:     0.010  # corporate deposit volume growth per quarter
  wholesale_growth_q:             0.000  # wholesale funding volume growth per quarter

funding:
  interbank_gap_spread:           0.0010  # premium over DFR for gap-fill interbank (10 bps)


# -----------------------------------------------------------------------------
# Capital
# -----------------------------------------------------------------------------
capital:
  # Buffer stack (ratios)
  cet1_target:            0.15    # management CET1 target ratio
  p2r:                    0.015   # Pillar 2 requirement (SREP-set; update per bank)
  ccyb:                   0.000   # countercyclical buffer
  osii:                   0.000   # O-SII systemic buffer

  # Instruments
  at1_coupon_rate:        0.060   # AT1 coupon rate (annualised)

  # Intangibles (deducted from CET1)
  goodwill:               0.0
  other_intangibles:      0.0

  # CRR3 output floor — set sa_rwa_estimate to SA RWA if IRB bank
  sa_rwa_estimate:        0.0

  # MREL
  mrel_req_pct:           0.0     # MREL requirement as % of TREA
  snp_eligible:           0.0     # SNP-eligible senior non-preferred (EUR mn)

  # DTA / DTC
  dta_regular_opening:        0.0   # opening regular DTA balance
  dtc_stock_opening:          0.0   # opening Greek DTC stock (non-Greek banks = 0)
  dtc_distribution_factor:    0.29  # SSM agreement: 29% of distributions amortise DTC
  dtc_statutory_schedule:     null  # list of 28 annual amortisation amounts; null = straight-line


# -----------------------------------------------------------------------------
# Payout policy
# -----------------------------------------------------------------------------
payout:
  regular_cash_dividend_pct:  0.40   # % of quarterly net profit paid as cash dividend
  buyback_pct:                0.20   # % of quarterly net profit used for buybacks
  extraordinary_payout_eur:   0.0    # one-off special distribution (EUR mn)
  extraordinary_quarter:      0      # quarter number (1–20) for extraordinary payout
  shares_outstanding:         0.0    # shares in issue (mn); used for EPS / DPS
  share_price:                0.0    # latest market price (EUR); used for P/E multiples


# -----------------------------------------------------------------------------
# OCI (Other Comprehensive Income stubs)
# -----------------------------------------------------------------------------
oci:
  bond_revaluation_sensitivity: 0.0   # EUR mn NII sensitivity per 100bps (for OCI bond P&L)
  hedge_reserve_annual:         0.0   # annual hedge reserve change (EUR mn)
  pension_actuarial_annual:     0.0   # annual pension actuarial gain / loss (EUR mn)


# -----------------------------------------------------------------------------
# Liquidity
# -----------------------------------------------------------------------------
liquidity:
  hqla_ratio:             0.20   # HQLA as % of total assets (proxy for LCR buffer)


# -----------------------------------------------------------------------------
# ECL Parameters (IFRS 9)
# -----------------------------------------------------------------------------
ecl:
  # PD assumptions (annualised)
  pd_s1:                  0.005   # Stage 1: 12-month PD (0.5% p.a.)
  pd_s2:                  0.080   # Stage 2: Lifetime PD (8% lifetime)
  pd_s3:                  1.0     # Stage 3: 100% PD (NPL)

  # LGD assumptions (secured/unsecured blend)
  lgd_s1:                 0.40    # Stage 1 LGD
  lgd_s2:                 0.40    # Stage 2 LGD
  lgd_s3:                 0.50    # Stage 3 LGD (higher coverage assumed)

  # Scenario probability weights (must sum to 1.0)
  weight_base:            0.50
  weight_adverse:         0.35
  weight_severe:          0.15

  # Macro stress PD multipliers
  pd_mult_adverse:        1.50    # +50% PD in adverse
  pd_mult_severe:        2.50    # +150% PD in severe


# -----------------------------------------------------------------------------
# RAROC Parameters
# -----------------------------------------------------------------------------
raroc:
  hurdle_rate:            0.12    # Cost of equity (12%)

  # Segment allocation weights (must sum to 1.0)
  segment_weights:
    retail:               0.50
    corporate:            0.35
    treasury:             0.15

  # Cost allocation weights
  cost_weights:
    retail:               0.55
    corporate:            0.30
    treasury:             0.15

  # ECL allocation weights
  ecl_weights:
    retail:               0.60
    corporate:            0.35
    treasury:             0.05

  # RWA allocation weights
  rwa_weights:
    retail:               0.50
    corporate:            0.40
    treasury:             0.10


# -----------------------------------------------------------------------------
# Repricing & NII Sensitivity
# -----------------------------------------------------------------------------
repricing:
  repricing_asset_pct:    0.70   # % of loan book that reprices each quarter
  nii_shock_parallel_bps: 100     # parallel shock size for ΔNII sensitivity (bps)


# -----------------------------------------------------------------------------
# Funding Betas (deposit pass-through)
# -----------------------------------------------------------------------------
funding_betas:
  retail_beta:             0.30   # retail deposits: 30% pass-through of rate changes
  corporate_beta:         0.55   # corporate deposits: 55% pass-through
  interbank_beta:         0.95   # interbank: 95% pass-through (near full)
  wholesale_beta:         0.80   # wholesale funding: 80% pass-through


# -----------------------------------------------------------------------------
# Liquidity (LCR/NSFR assumptions)
# -----------------------------------------------------------------------------
liquidity_rates:
  # Outflow rates (30-day stress)
  outflow_retail_stable:       0.05    # stable retail deposits
  outflow_retail_less_stab:    0.10    # less stable retail
  outflow_corporate:           0.25    # corporate (non-operational)
  outflow_covered_bonds:       0.15    # covered bonds due < 30d
  outflow_cb_funding:          0.25    # central bank funding

  # Inflow rates
  inflow_loans_performing:     0.50    # cap on contractual inflows from performing loans

  # RSF factors (1.0 = fully stable)
  rsf_loans_long:             0.85    # >1Y performing loans
  rsf_loans_short:            0.50    # <1Y performing loans / revolver
  rsf_bonds_hqla:            0.05    # Level 1 HQLA bonds

  # ASF factors (1.0 = fully stable)
  asf_wholesale_short:         0.00    # <6M wholesale: 0% ASF
  asf_retail_stable:          0.95    # stable retail deposits
  asf_retail_less_stab:       0.90    # less stable retail
  asf_corporate:              0.50    # corporate deposits


# -----------------------------------------------------------------------------
# Capital Regulatory Minimums
# -----------------------------------------------------------------------------
capital_regulatory:
  min_cet1_ratio:          0.045   # P CET1 minimum (illar 14.5%)
  mda_buffer:              0.025   # MDA buffer (2.5%)
  min_t1_ratio:           0.060   # Tier 1 minimum (6.0%)
  min_total_cap_ratio:    0.080   # Total capital minimum (8.0%)


# -----------------------------------------------------------------------------
# VBM / Economic Profit CAPM Parameters
# -----------------------------------------------------------------------------
vbm:
  risk_free_rate:         0.030   # 3.0% (ECB deposit facility long-run neutral)
  equity_risk_premium:    0.055   # 5.5% EU ERP (Damodaran estimate)
  beta_bank:              1.10    # Average EU mid-cap bank beta


# -----------------------------------------------------------------------------
# Benchmarking
# -----------------------------------------------------------------------------
benchmarking:
  peer_lei_list:          null   # null = auto-select same-country peers from banks table
