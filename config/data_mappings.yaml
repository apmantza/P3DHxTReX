# -----------------------------------------------------------------------------
# Benchmarking Metrics (P3DH)
# -----------------------------------------------------------------------------
# Key metrics for peer benchmarking - maps P3DH templates to analytics

benchmarking:

  # ---------------------------------------------------------------------------
  # Key Metrics (KM1)
  # ---------------------------------------------------------------------------
  km1:
    template: "K_61.00 - EU KM1 - Key metrics template"
    items:
      cet1_capital:
        row: "0010"
        col: "0010"  # Column T (current)
        unit: "EUR"
        description: "CET1 capital"

      tier1_capital:
        row: "0020"
        col: "0010"
        unit: "EUR"
        description: "Tier 1 capital"

      total_capital:
        row: "0030"
        col: "0010"
        unit: "EUR"
        description: "Total capital"

      total_rwa:
        row: "0040"
        col: "0010"
        unit: "EUR"
        description: "Total RWA"

      cet1_ratio:
        row: "0050"
        col: "0010"
        unit: "PCT"
        description: "CET1 ratio"

      tier1_ratio:
        row: "0060"
        col: "0010"
        unit: "PCT"
        description: "Tier 1 ratio"

      total_capital_ratio:
        row: "0070"
        col: "0010"
        unit: "PCT"
        description: "Total capital ratio"

      leverage_ratio:
        row: "0080"
        col: "0010"
        unit: "PCT"
        description: "Leverage ratio"

  # ---------------------------------------------------------------------------
  # Liquidity - LCR (LIQ1)
  # ---------------------------------------------------------------------------
  liq1:
    template: "K_73.00 - EU LIQ1 - Quantitative information of LCR"
    items:
      total_hqla:
        row: "0100"
        unit: "EUR"
        description: "Total HQLA"

      total_outflows:
        row: "0110"
        unit: "EUR"
        description: "Total cash outflows"

      total_inflows:
        row: "0120"
        unit: "EUR"
        description: "Total cash inflows"

      net_cash_outflows:
        row: "0130"
        unit: "EUR"
        description: "Net cash outflows"

      lcr_ratio:
        row: "0140"
        unit: "PCT"
        description: "LCR ratio"

  # ---------------------------------------------------------------------------
  # Liquidity - NSFR (LIQ2)
  # ---------------------------------------------------------------------------
  liq2:
    template: "K_74.00 - EU LIQ2: Net Stable Funding Ratio"
    items:
      available_stable_funding:
        row: "0100"
        unit: "EUR"
        description: "Available stable funding"

      required_stable_funding:
        row: "0110"
        unit: "EUR"
        description: "Required stable funding"

      nsfr_ratio:
        row: "0120"
        unit: "PCT"
        description: "NSFR ratio"

  # ---------------------------------------------------------------------------
  # MREL (KM2)
  # ---------------------------------------------------------------------------
  km2:
    template: "K_90.01 - EU KM2 - Key metrics - MREL"
    items:
      mrel_capacity:
        row: "0100"
        unit: "EUR"
        description: "MREL capacity"

      mrel_requirement:
        row: "0110"
        unit: "EUR"
        description: "MREL requirement"

      mrel_ratio:
        row: "0120"
        unit: "PCT"
        description: "MREL ratio"

  # ---------------------------------------------------------------------------
  # Credit Quality - CR1 (Performing vs Non-Performing)
  # ---------------------------------------------------------------------------
  cr1:
    template: "K_21.01 - EU CR1: Performing and non-performing exposures"
    items:
      performing_exposures:
        row: "0010"  # Performing
        unit: "EUR"
        description: "Performing exposures gross"

      non_performing_exposures:
        row: "0030"  # Non-performing
        unit: "EUR"
        description: "Non-performing exposures gross"

  # ---------------------------------------------------------------------------
  # Credit Quality - CR2 (NPL Changes)
  # ---------------------------------------------------------------------------
  cr2:
    template: "K_22.01 - EU CR2: Changes in NPL stock"
    items:
      npl_inflow:
        row: "0010"
        unit: "EUR"
        description: "New non-performing exposures"

      npl_outflow:
        row: "0030"
        unit: "EUR"
        description: "Reduction of non-performing exposures"

      npl_cures:
        row: "0020"
        unit: "EUR"
        description: "Cures"

      npl_write_offs:
        row: "0040"
        unit: "EUR"
        description: "Write-offs"

  # ---------------------------------------------------------------------------
  # IRRBB
  # ---------------------------------------------------------------------------
  irrbb:
    template: "K_68.00 - EU IRRBB1"
    items:
      eve_sensitivity:
        row: "0010"
        unit: "EUR"
        description: "EVE sensitivity"

      nii_sensitivity:
        row: "0020"
        unit: "EUR"
        description: "NII sensitivity"


