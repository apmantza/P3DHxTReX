# =============================================================================
# BBIRR Data Mappings
# =============================================================================
# Maps between:
#   - TREX (EBA Transparency Exercise) templates/items
#   - P3DH (EU-wide Stress Test) templates/items
#   - Internal projection model fields
#
# Usage:
#   - BaseYearExtractor: reads TREX/P3DH → populates BaseYear dataclass
#   - Benchmarking: aggregates peer data for percentiles
#   - Canonical merge: deduplicate overlaps using semantic equivalence
#
# VALIDATION: Run scripts/validate_semantic_equivalence.py to regenerate
# =============================================================================

# -----------------------------------------------------------------------------
# TREX ↔ P3DH Semantic Equivalence - VALIDATED
# -----------------------------------------------------------------------------
# These mappings have been verified by comparing values at 2025-06-30
# across 5+ overlapping banks.
#
# KEY FINDINGS:
#   - Capital/RWA: P3DH EUR / 1,000,000 = TREX EUR millions
#   - Ratios: Values match directly (both in %)
#   - 20 banks overlap at 2025-06-30
#
# Format:
#   common_name:
#     trex: {template: "...", item: NNNNN}
#     p3dh: {template: "...", row: "NNNN"}
#     validated: true/false
#     unit_conversion: "..."

semantic_equivalence:

  # ---------------------------------------------------------------------------
  # KEY METRICS (KM1) - All validated at 2025-06-30
  # ---------------------------------------------------------------------------
  cet1_capital:
    trex:
      template: "Capital"
      item: 2520102
    p3dh:
      template: "K_61.00 - EU KM1 - Key metrics template"
      row: "0010"
      column: "0010"
    description: "CET1 Capital (EUR millions)"
    priority: "p3dh"
    validated: true
    unit_conversion: "P3DH_EUR / 1000000 = TREX_EUR_millions"
    matching_banks: 5

  tier1_capital:
    trex:
      template: "Capital"
      item: 2520133
    p3dh:
      template: "K_61.00 - EU KM1 - Key metrics template"
      row: "0020"
      column: "0010"
    description: "Tier 1 Capital (EUR millions)"
    priority: "p3dh"
    validated: true
    unit_conversion: "P3DH_EUR / 1000000 = TREX_EUR_millions"
    matching_banks: 5

  total_capital:
    trex:
      template: "Capital"
      item: 2520101
    p3dh:
      template: "K_61.00 - EU KM1 - Key metrics template"
      row: "0030"
      column: "0010"
    description: "Total Capital (EUR millions)"
    priority: "p3dh"
    validated: true
    unit_conversion: "P3DH_EUR / 1000000 = TREX_EUR_millions"
    matching_banks: 5

  total_rwa:
    trex:
      template: "RWA OV1"
      item: 2520220
    p3dh:
      template: "K_61.00 - EU KM1 - Key metrics template"
      row: "0040"
      column: "0010"
    description: "Total RWA (EUR millions)"
    priority: "p3dh"
    validated: true
    unit_conversion: "P3DH_EUR / 1000000 = TREX_EUR_millions"
    matching_banks: 5

  cet1_ratio:
    trex:
      template: "Capital"
      item: 2520140
    p3dh:
      template: "K_61.00 - EU KM1 - Key metrics template"
      row: "0050"
      column: "0010"
    description: "CET1 Ratio (%)"
    priority: "p3dh"
    validated: true
    unit_conversion: "none"
    matching_banks: 5

  tier1_ratio:
    trex:
      template: "Capital"
      item: 2520141
    p3dh:
      template: "K_61.00 - EU KM1 - Key metrics template"
      row: "0060"
      column: "0010"
    description: "Tier 1 Ratio (%)"
    priority: "p3dh"
    validated: true
    unit_conversion: "none"
    matching_banks: 5

  total_capital_ratio:
    trex:
      template: "Capital"
      item: 2520142
    p3dh:
      template: "K_61.00 - EU KM1 - Key metrics template"
      row: "0070"
      column: "0010"
    description: "Total Capital Ratio (%)"
    priority: "p3dh"
    validated: true
    unit_conversion: "none"
    matching_banks: 5

  # ---------------------------------------------------------------------------
  # ADDITIONAL VALIDATED MAPPINGS
  # ---------------------------------------------------------------------------
  total_assets:
    trex:
      template: "Assets"
      item: 2521010
    p3dh:
      template: "K_66.02 - EU CC2 - reconciliation of regulatory"
      row: "0010"
    description: "Total Assets (EUR millions)"
    priority: "p3dh"
    validated: true
    unit_conversion: "P3DH_EUR / 1000000 = TREX_EUR_millions"
    note: "CC2 template"

  # ---------------------------------------------------------------------------
  # NOT VALIDATED - Need further investigation
  # ---------------------------------------------------------------------------
  lcr_ratio:
    trex:
      template: "Liquidity"
    p3dh:
      template: "K_73.00 - EU LIQ1 - Quantitative information of LCR"
      row: "0140"
    description: "LCR Ratio %"
    priority: "p3dh"
    validated: false
    note: "TREX may not have LCR"

  nsfr_ratio:
    trex:
      template: "Liquidity"
    p3dh:
      template: "K_74.00 - EU LIQ2: Net Stable Funding Ratio"
      row: "0120"
    description: "NSFR Ratio %"
    priority: "p3dh"
    validated: false
    note: "TREX may not have NSFR"


# -----------------------------------------------------------------------------
# Projection Model → TREX/P3DH Mapping
# -----------------------------------------------------------------------------
# TREX ↔ P3DH Semantic Equivalence
# -----------------------------------------------------------------------------
# Identifies overlapping metrics between TREX and P3DH for deduplication.
# Priority: P3DH > TREX (more current, regulator-validated)
#
# VALIDATED: These pairs have been verified to match (2025-06-30):
#   - CET1 Capital: TREX Capital 2520102 ≈ P3DH KM1 row 0010 (normalized by 1M)
#   - Total Capital: TREX Capital 2520101 ≈ P3DH KM1 row 0030 (normalized by 1M)
#
# EXCEPTIONS/NOTES:
#   - Tier1 Capital: Values differ (different definitions?)
#   - CET1 Ratio: TREX 2520104 is NOT ratio - needs correct SDD code
#   - Total RWA: Values differ (different methodologies)
#   - Total Assets: Accounting consolidation differences
#   - Unit conversion: P3DH EUR / 1,000,000 = TREX EUR millions
#
# Format:
#   common_name:
#     - trex: {template: "...", item: NNNNN}
#       p3dh: {template: "...", row: "NNNN"}
#       description: "..."
#       validated: true/false
#       note: "..."

semantic_equivalence:

  # ---------------------------------------------------------------------------
  # VALIDATED - Values match (2025-06-30)
  # ---------------------------------------------------------------------------
  cet1_capital:
    trex:
      template: "Capital"
      item: 2520102
    p3dh:
      template: "K_61.00 - EU KM1 - Key metrics template"
      row: "0010"
    description: "CET1 Capital"
    priority: "p3dh"
    validated: true
    unit_conversion: "P3DH_EUR / 1000000 = TREX_EUR_millions"

  total_capital:
    trex:
      template: "Capital"
      item: 2520101
    p3dh:
      template: "K_61.00 - EU KM1 - Key metrics template"
      row: "0030"
    description: "Total Capital"
    priority: "p3dh"
    validated: true
    unit_conversion: "P3DH_EUR / 1000000 = TREX_EUR_millions"

  # ---------------------------------------------------------------------------
  # NOT VALIDATED - Need investigation
  # ---------------------------------------------------------------------------
  tier1_capital:
    trex:
      template: "Capital"
      item: 2520103
    p3dh:
      template: "K_61.00 - EU KM1 - Key metrics template"
      row: "0020"
    description: "Tier 1 Capital"
    priority: "p3dh"
    validated: false
    note: "Values differ significantly - likely different definitions"

  total_rwa:
    trex:
      template: "RWA OV1"
      item: 2520201
    p3dh:
      template: "K_61.00 - EU KM1 - Key metrics template"
      row: "0040"
    description: "Total Risk Weighted Assets"
    priority: "p3dh"
    validated: false
    note: "Values differ - possibly CRR/CRR3 methodology differences"

  total_assets:
    trex:
      template: "Assets"
      item: 2521010
    p3dh:
      template: "K_70.00 - EU LR1 - LRSum"
      row: "0010"
    description: "Total Assets"
    priority: "p3dh"
    validated: false
    note: "Values differ - accounting consolidation scope differences"

  # ---------------------------------------------------------------------------
  # Ratios - NOT VALIDATED (need correct SDD codes)
  # ---------------------------------------------------------------------------
  cet1_ratio:
    trex:
      template: "Capital"
      item: 2520104  # WRONG - this is not the ratio
    p3dh:
      template: "K_61.00 - EU KM1 - Key metrics template"
      row: "0050"
    description: "CET1 Ratio %"
    priority: "p3dh"
    validated: false
    note: "TREX item 2520104 is NOT CET1 ratio - needs correct SDD code"

  tier1_ratio:
    trex:
      template: "Capital"
      item: 2520105  # UNKNOWN
    p3dh:
      template: "K_61.00 - EU KM1 - Key metrics template"
      row: "0060"
    description: "Tier 1 Ratio %"
    priority: "p3dh"
    validated: false
    note: "Need to verify correct TREX SDD code"

  total_capital_ratio:
    trex:
      template: "Capital"
      item: 2520106  # UNKNOWN
    p3dh:
      template: "K_61.00 - EU KM1 - Key metrics template"
      row: "0070"
    description: "Total Capital Ratio %"
    priority: "p3dh"
    validated: false
    note: "Need to verify correct TREX SDD code"

  leverage_ratio:
    trex:
      template: "Leverage"
      item: 2520901  # UNKNOWN
    p3dh:
      template: "K_61.00 - EU KM1 - Key metrics template"
      row: "0080"
    description: "Leverage Ratio %"
    priority: "p3dh"
    validated: false
    note: "TREX Leverage template uses different item codes"

  # ---------------------------------------------------------------------------
  # Liquidity
  # ---------------------------------------------------------------------------
  lcr_ratio:
    trex:
      template: "Liquidity"  # Not available in TREX?
    p3dh:
      template: "K_73.00 - EU LIQ1 - Quantitative information of LCR"
      row: "0140"
    description: "LCR Ratio %"
    priority: "p3dh"
    validated: false
    note: "TREX may not have LCR"

  nsfr_ratio:
    trex:
      template: "Liquidity"  # Not available in TREX?
    p3dh:
      template: "K_74.00 - EU LIQ2: Net Stable Funding Ratio"
      row: "0120"
    description: "NSFR Ratio %"
    priority: "p3dh"
    validated: false
    note: "TREX may not have NSFR"

  # ---------------------------------------------------------------------------
  # P&L (TREX only - P3DH doesn't have quarterly P&L)
  # ---------------------------------------------------------------------------
  net_interest_income:
    trex:
      template: "P&L"
      item: 2520301
    p3dh:
      template: null  # Not available in P3DH quarterly
    description: "Net Interest Income"
    priority: "trex"
    validated: false
    note: "P3DH only has KM1 annual figures, not quarterly P&L"

  total_operating_income:
    trex:
      template: "P&L"
      item: 2520316
    p3dh:
      template: null
    description: "Total Operating Income"
    priority: "trex"
    validated: false

  net_profit:
    trex:
      template: "P&L"
      item: 2520335
    p3dh:
      template: null
    description: "Net Profit"
    priority: "trex"
    validated: false

  # ---------------------------------------------------------------------------
  # NPE / Credit Quality
  # ---------------------------------------------------------------------------
  npe_total:
    trex:
      template: "NPE"
      item: 2520603
      column: 3
    p3dh:
      template: "K_21.01 - EU CR1: Performing and non-performing exposures"
      row: "0030"
    description: "Non-Performing Exposures Gross"
    priority: "p3dh"
    validated: false
    note: "Different definitions (defaulted vs 90dpd)"


